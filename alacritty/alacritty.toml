[font]
size = 15
builtin_box_drawing = true

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[colors.primary]
background = "#011627"
foreground = "#d6deeb"

[colors.cursor]
cursor = "#80a4c2"

[colors.normal]
black =   "#1d3b53"
red =     "#fc514e"
green =   "#22da6e"
yellow =  "#e3d18a"
blue =    "#82aaff"
magenta = "#c792ea"
cyan =    "#21c7a8"
white =   "#ffffff"

[colors.bright]
black =   "#7fdbca"
red =     "#ff5874"
green =   "#22da6e"
yellow =  "#ffeb95"
blue =    "#82aaff"
magenta = "#c792ea"
cyan =    "#7fdbca"
white =   "#ffffff"
[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen" 
[window]
padding.x = 0
padding.y = 0
startup_mode = "Maximized"
decorations = "Buttonless"
[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500
[scrolling]
history = 10000
