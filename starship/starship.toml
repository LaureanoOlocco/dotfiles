format = """
[в•ӯв”Җв–‘в–’в–“](#82aaff)\
[ у°•Ҳ ](bg:#82aaff fg:#011627)\
[оӮҙ](bg:#233554 fg:#82aaff)\
$directory\
[оӮҙ ](fg:#233554  bg:#82aaff)\
$git_branch\
$git_status\
[оӮҙ ](fg:#82aaff bg:none)\
$fill\
[оӮ¶](fg:#233554 bg:none)\
$python\
$c\
$cpp\
$cmd_duration\
$status\
[ оӮ· ](fg:#82aaff bg:#233554)\
$time\
[](fg:#233554)\
[оӮҙ ](fg:#233554)\
\n$character"""
[character]
format = "[в•°в”Җ](bold #82aaff) "
[fill]
symbol = "В·"
style = "dimmed #5f7e97"


[status]
disabled = false
format = "[$symbol]($style)"
symbol = "п‘§ "
success_symbol = "пҗ® "
style = "#ef5350 bg:#233554"
success_style = "#addb67 bg:#233554"
recognize_signal_code = false
pipestatus = true

[time]
disabled = false
time_format = "%R"
style = "bg:#233554"
format = '[[пҗә  $time ](fg:#7fdbca bg:#233554)]($style)'


[directory]
style = "fg:#d6deeb bg:#233554"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = " у°Ҳҷ "
"Downloads" = " пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#82aaff"
format = '[[$symbol $branch ](fg:#011627 bg:#82aaff)]($style)'
truncation_length = 20
truncation_symbol = "вҖҰ"

[git_status]
style = "bg:#82aaff"
format = '[[($all_status$ahead_behind )](fg:#011627 bg:#82aaff)]($style)'
stashed = "у°Ҹ— ${count} "
modified = "у°Ҹ« ${count} "
untracked = "о©ҝ ${count} "
ahead = "у°ңё ${count} "
behind = "у°ңҜ ${count} "
[nodejs]
symbol = "оңҳ "
style = "bg:#233554"
format = '[[ $symbol ($version) ](fg:#addb67 bg:#233554)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#233554"
format = '[[ $symbol ($version) ](fg:#f78c6c bg:#233554)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#233554"
format = '[[ $symbol ($version) ](fg:#7fdbca bg:#233554)]($style)'

[php]
symbol = "оҳҲ "
style = "bg:#233554"
format = '[[ $symbol ($version) ](fg:#c792ea bg:#233554)]($style)'

[python]
symbol = "оҲө "
style = "bg:#233554"
format = '[[ $symbol ($version) (\($virtualenv\)) ](fg:#ffcb6b bg:#233554)[оӮ· ](fg:#82aaff bg:#233554)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#233554"
format = '[[ $symbol($version) ](fg:#82aaff bg:#233554)[ ](fg:#82aaff bg:#233554)]($style)'

[cpp]
symbol = "оҳқ "

[cmd_duration]
min_time = 500
format = "[$duration ]($style)"
style = "#ffcb6b bg:#233554"

