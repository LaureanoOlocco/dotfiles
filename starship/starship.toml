palette = "cursor_dark"
add_newline = false

format = """
[в•ӯв”Җв–‘в–’в–“](blue)\
[ оҜү ](bg:blue fg:base)\
[оӮҙ](bg:panel fg:blue)\
$directory\
[оӮҙ ](fg:panel  bg:blue)\
$git_branch\
$git_status\
$git_state\
[оӮҙ ](fg:blue bg:none)\
$fill\
[оӮ¶](fg:panel bg:none)\
$python\
$c\
$cpp\
$cmd_duration\
$status\
[ оӮ· ](fg:blue bg:panel)\
$battery\
[ оӮ· ](fg:blue_soft bg:panel)\
$time\
[](fg:panel)\
[оӮҙ ](fg:panel)\
\n$character"""

[palettes.cursor_dark]
base = "#181818"
panel = "#242424"
panel_soft = "#1d1d1d"
text = "#D4D4D4"
muted = "#8E8E8E"
blue = "#81A1C1"
blue_soft = "#87A6C4"
green = "#70B489"
yellow = "#F1B467"
yellow_soft = "#EBC88D"
red = "#FC6B83"
red_soft = "#F14C4C"
magenta = "#B48EAD"
cyan = "#88C0D0"

[character]
success_symbol = "[в•°в”Җ](bold blue)"
error_symbol = "[в•°в”Җ](bold blue)"
vimcmd_symbol = "[в•°в”Җ](bold yellow)"
[fill]
symbol = "в”Җ"
style = "muted"


[status]
disabled = false
format = "[$symbol]($style)"
symbol = "п”Ҝ "
success_symbol = "пҒқ "
style = "blue_soft bg:panel"
success_style = "blue_soft bg:panel"
recognize_signal_code = false
pipestatus = true

[time]
disabled = false
time_format = "%R"
style = "bg:panel"
format = '[[у°Җ   ](fg:blue_soft bg:panel)[$time ](fg:cyan bg:panel)]($style)'


[directory]
style = "fg:text bg:panel"
format = "[ $path$read_only ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = "~"
read_only = " у°Ңҫ"
read_only_style = "fg:yellow bg:panel"

[directory.substitutions]
"Documents" = " у°Ҳҷ "
"Downloads" = " пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:blue"
format = '[[$symbol $branch](fg:base bg:blue)]($style)'
truncation_length = 20
truncation_symbol = "вҖҰ"

[git_status]
style = "bg:blue"
format = '[[(оӮө $all_status$ahead_behind )](fg:base bg:blue)]($style)'
stashed = "у°Ҹ— ${count} "
modified = "у°Ҹ« ${count} "
untracked = "о©ҝ ${count} "
deleted = "у°Ҷҙ ${count} "
staged = "пӮ“ ${count} "
ahead = "у°ңё ${count} "
behind = "у°ңҜ ${count} "

[git_state]
style = "bg:blue"
format = '[[($state( $progress_current/$progress_total) )](fg:base bg:blue)]($style)'

[nodejs]
symbol = "оңҳ "
style = "bg:panel"
format = '[[ $symbol ($version) ](fg:green bg:panel)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:panel"
format = '[[ $symbol ($version) ](fg:yellow bg:panel)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:panel"
format = '[[ $symbol ($version) ](fg:cyan bg:panel)]($style)'

[php]
symbol = "оҳҲ "
style = "bg:panel"
format = '[[ $symbol ($version) ](fg:magenta bg:panel)]($style)'

[python]
symbol = "оҲө "
style = "bg:panel"
format = '[[ $symbol ($version) (\($virtualenv\)) ](fg:yellow_soft bg:panel)[оӮ· ](fg:blue bg:panel)]($style)'

[c]
symbol = "оҳһ "
style = "bg:panel"
format = '[[ $symbol($version) ](fg:blue bg:panel)[ ](fg:blue bg:panel)]($style)'

[cpp]
symbol = "оҳқ "

[cmd_duration]
min_time = 500
format = "[$duration ]($style)"
style = "yellow_soft bg:panel"

[battery]
disabled = false
format = '[[ $symbol$percentage ](fg:blue_soft bg:panel)]($style)'

[[battery.display]]
threshold = 20
style = 'fg:red bg:panel'

[[battery.display]]
threshold = 60
style = 'fg:yellow bg:panel'

[[battery.display]]
threshold = 100
style = 'fg:green bg:panel'
